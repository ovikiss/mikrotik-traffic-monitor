name: ci

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate shell script syntax
        run: |
          sh -n app/mt-traffic.sh
      - name: Validate Docker build
        run: |
          docker build -t mtm-ci-test .
