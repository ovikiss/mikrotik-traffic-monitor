# Lovelace example cards

type: vertical-stack
cards:
  - type: entities
    title: MikroTik Traffic KPIs
    entities:
      - entity: sensor.mikrotik_traffic_today
        name: Today
      - entity: sensor.mikrotik_traffic_today_rx
        name: Today Download (RX)
      - entity: sensor.mikrotik_traffic_today_tx
        name: Today Upload (TX)
      - entity: sensor.mikrotik_traffic_month
        name: This Month
      - entity: sensor.mikrotik_traffic_month_rx
        name: Month Download (RX)
      - entity: sensor.mikrotik_traffic_month_tx
        name: Month Upload (TX)
      - entity: sensor.mikrotik_traffic_year
        name: This Year
      - entity: sensor.mikrotik_traffic_year_rx
        name: Year Download (RX)
      - entity: sensor.mikrotik_traffic_year_tx
        name: Year Upload (TX)
      - entity: sensor.mikrotik_traffic_samples
        name: Samples
      - entity: sensor.mikrotik_traffic_db_size
        name: DB Size (MB)
      - entity: sensor.mikrotik_traffic_db_size_bytes
        name: DB Size (Bytes)
      - entity: sensor.mikrotik_traffic_poll_interval
        name: Poll interval
      - entity: sensor.mikrotik_traffic_last_update
        name: Last update

  - type: gauge
    entity: sensor.mikrotik_traffic_today
    name: Today traffic
    min: 0
    max: 100
    unit: GiB
