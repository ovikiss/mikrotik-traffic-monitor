# Home Assistant package example for MikroTik Traffic Monitor API
# Resource endpoint: http://192.168.88.1:8088/api/summary.json

rest:
  - resource: "http://192.168.88.1:8088/api/summary.json"
    scan_interval: 120
    sensor:
      - name: "MikroTik Traffic Summary"
        unique_id: mikrotik_traffic_summary
        value_template: "{{ value_json.kpi.today_total_gib }}"
        unit_of_measurement: "GiB"
        json_attributes_path: "$.kpi"
        json_attributes:
          - today_total_gib
          - month_total_gib
          - year_total_gib

template:
  - sensor:
      - name: "MikroTik Traffic Today"
        unique_id: mikrotik_traffic_today
        unit_of_measurement: "GiB"
        state: "{{ state_attr('sensor.mikrotik_traffic_summary', 'today_total_gib') | float(0) | round(3) }}"
      - name: "MikroTik Traffic Month"
        unique_id: mikrotik_traffic_month
        unit_of_measurement: "GiB"
        state: "{{ state_attr('sensor.mikrotik_traffic_summary', 'month_total_gib') | float(0) | round(3) }}"
      - name: "MikroTik Traffic Year"
        unique_id: mikrotik_traffic_year
        unit_of_measurement: "GiB"
        state: "{{ state_attr('sensor.mikrotik_traffic_summary', 'year_total_gib') | float(0) | round(3) }}"
