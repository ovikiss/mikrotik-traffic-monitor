<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link rel="stylesheet" id="theme-style-css" href="styles-modern.css?v=20260516f" />
</head>
<body>
  <div class="dashboard-container">
    <div class="topbar" data-mikrotik-header-root></div>

  <div class="dashboard-grid">

  <div class="kpis">
    <div class="kpi">
      <div class="kpi-header">
        <span class="label" id="label-day">Total Today</span>
      </div>
      <div class="kpi-body">
        <div class="kpi-value-block">
          <span class="val" id="kpi-day">0.00 GiB</span>
        </div>
        <div class="kpi-sparkline" id="sparkline-day"></div>
      </div>
      <div class="sub"><span id="kpi-day-rx">RX: 0.00 GiB</span> <span class="sub-sep">|</span> <span id="kpi-day-tx">TX: 0.00 GiB</span></div>
    </div>
    <div class="kpi">
      <div class="kpi-header">
        <span class="label" id="label-month">Current Month Total</span>
      </div>
      <div class="kpi-body">
        <div class="kpi-value-block">
          <span class="val" id="kpi-month">0.00 GiB</span>
        </div>
        <div class="kpi-sparkline" id="sparkline-month"></div>
      </div>
      <div class="sub"><span id="kpi-month-rx">RX: 0.00 GiB</span> <span class="sub-sep">|</span> <span id="kpi-month-tx">TX: 0.00 GiB</span></div>
    </div>
    <div class="kpi">
      <div class="kpi-header">
        <span class="label" id="label-year">Current Year Total</span>
      </div>
      <div class="kpi-body">
        <div class="kpi-value-block">
          <span class="val" id="kpi-year">0.00 GiB</span>
        </div>
        <div class="kpi-sparkline" id="sparkline-year"></div>
      </div>
      <div class="sub"><span id="kpi-year-rx">RX: 0.00 GiB</span> <span class="sub-sep">|</span> <span id="kpi-year-tx">TX: 0.00 GiB</span></div>
    </div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" data-tab="day" id="tab-day">Day</button>
      <button class="tab" data-tab="month" id="tab-month">Month</button>
      <button class="tab" data-tab="year" id="tab-year">Year</button>
    </div>

    <div class="table-scroll">
      <table>
        <thead>
          <tr id="table-header-row">
            <th id="th-period">Period</th>
            <th class="num" id="th-total">Total</th>
            <th class="num" id="th-rx">RX</th>
            <th class="num" id="th-tx">TX</th>
            <th id="th-visual">Visual</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>

    <div class="meta" id="meta">Loading...</div>
  </div>
  </div>
  </div>

<script src="common/header.js"></script>
<script src="common/dropdown-utils.js"></script>
<script src="/app.js" defer></script>
</body>
</html>
